<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissor</title>
    <link rel="stylesheet" href="css/RockPaperScissor.css">
</head>
<body>
    <h1>
        Rock Paper Scissor Game!!
    </h1>
    <main>
        <div class="container">
            <br>
            <button id="resetBtn">
                Reset Game.
            </button>
            <br>
            <br>
            <div>
            <label class="hide" id="complbl">Computer Choose: </label>
            </div>
            <div class="choices">
                <div class="choice" id="rock">
                    <img src="images/rock.png">
                </div>
                <div class="choice" id="paper">
                    <img src="images/paper.png">
                </div>
                <div class="choice" id="scissors">
                    <img src="images/scissors.png">
                </div>
            </div>

            <div class="score-board">
                <div class="score">
                    <p id="userScore">0</p>
                    <p>You</p>
                </div>
                <div class="score">
                    <p id="compScore">0</p>
                    <p>Computer</p>
                </div>
            </div>

            <div class="msg-container">
                <p id="msg">Choose your move!</p>
            </div>
        </div>
    </main>
    <div>

    </div>
    <script src="js/RockPaperScissor.js"></script>
</body>
</html>
